# Shared, cross-platform variables for both Pop!_OS and Fedora KDE

common_cli_packages:
  - git
  - jq
  - bat
  - direnv
  - micro
  - timeshift
  - keychain
  - syncthing

common_dev_packages:
  - zsh
  - zsh-autosuggestions

common_other_packages:
  - vlc
  - discord

flatpak_packages:
  - com.logseq.Logseq
  - org.prismlauncher.PrismLauncher
  - com.github.PintaProject.Pinta

homebrew_packages:
  - kubectl

purged_os_packages:
  - libreoffice*
  - kmail*
  - kontact*
  - korganizer*
  - dragon

# NAS Mount Variables (NFS)
nas_nfs_src: "homecloud.local:/volume1/SharedLand"
nas_mount_point: "mnt/SharedLand"
nas_symlink_src: "mnt/SharedLand/SyncFolder"
nas_symlink_dest: "SyncFolder"

# Secondary HDD Mount Variables
hdd_uuid: "93e35c87-80a1-497c-85d0-a16b9448ea10"
hdd_mount_point: "/media/boris/DataDrive"
hdd_fstype: "auto"
hdd_mount_opts: "nosuid,nodev,nofail,x-gvfs-show"
