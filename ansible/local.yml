---
- name: Workstation Declarative Provisioning Playbook
  hosts: localhost
  connection: local
  become: yes

  vars_files:
    - vars/default.yml

  tasks:
    - name: Load OS-specific variables
      ansible.builtin.include_vars:
        file: "vars/{{ ansible_facts['os_family'] }}.yml"

    - name: Configure repositories
      ansible.builtin.include_tasks: tasks/repositories.yml

    - name: Provision system packages and package managers
      ansible.builtin.include_tasks: tasks/packages.yml

    - name: Apply performance and kernel tweaks
      ansible.builtin.include_tasks: tasks/system_tweaks.yml

    - name: Configure user shell, dotfiles, and terminals
      ansible.builtin.include_tasks: tasks/user_environment.yml

    - name: Configure desktop environment settings
      ansible.builtin.include_tasks: tasks/desktop_environment.yml

    - name: Configure storage and mount points
      ansible.builtin.include_tasks: tasks/mounts.yml

    - name: Configure system update automation
      ansible.builtin.include_tasks: tasks/system_updates.yml

    - name: Configure backup automation
      ansible.builtin.include_tasks: tasks/backup.yml
