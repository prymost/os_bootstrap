# Fedora Kickstart Configuration for Semi-Automated Minimal KDE Setup
# Version: Fedora 40+ / Everything Netinstall

# Use graphical install
graphical

# Keyboard layouts
keyboard --vconsole.keymap=us --xlayouts='us'

# System language
lang en_US.UTF-8

# Timezone
timezone America/Los_Angeles --utc

# Network information
network --bootproto=dhcp --device=link --activate

# User creation (will prompt for password during install or first boot)
user --name=boris --groups=wheel

# Root password config (lock root account for security)
rootpw --lock

# System services
services --enabled="sddm,NetworkManager,sshd"

# Firewalld config (default enabled)
firewall --enabled --ssh

# SELinux config (default enforcing)
selinux --enforcing

# ── Disk Partitioning (INTERACTIVE) ─────────────────────────────────────────
# We do NOT include clearpart, ignoredisk, or autopart.
# This forces the Anaconda installer to pause at the partitioning screen,
# letting you select the disk, partition layout, or format manually.
# Once partitioning is confirmed and you click "Begin Installation",
# the rest of the installation runs completely unattended.

%packages
# Minimal core components
@core
@base-x
plasma-desktop          # Minimal KDE Plasma shell
kwin-wayland            # Wayland window compositor
sddm                    # Login screen manager
plasma-nm               # Network manager applet (WiFi/Ethernet settings)
plasma-pa               # Volume control tray applet
systemsettings          # KDE settings control panel (displays, shortcuts, etc.)
dolphin                 # KDE native file manager
konsole                 # KDE native terminal
spectacle               # Wayland native screenshot tool
pipewire                # Audio server
git                     # Needed to clone the bootstrap repository
ansible                 # Provisioning engine
curl                    # Essential download tool
wget                    # Essential download tool
gcc                     # Development tools
gcc-c++                 # Development tools
make                    # Development tools
util-linux-user         # Required for chsh (changing default shell)
wl-clipboard            # Native Wayland clipboard tools
xcb-util-cursor         # Required cursor libraries
procps-ng               # Process management and sysctl utility
%end

%post --log=/var/log/anaconda/post-install.log
# Ensure sddm login manager is enabled
systemctl enable sddm
# Boot directly to the graphical desktop
systemctl set-default graphical.target

# Create the first-boot autostart directory for user 'boris'
mkdir -p /home/boris/.config/autostart
mkdir -p /home/boris/Workspace

# Create the desktop autostart file to run the bootstrap terminal on first login
cat << 'EOF' > /home/boris/.config/autostart/bootstrap.desktop
[Desktop Entry]
Type=Application
Exec=konsole --hold -e /home/boris/desktop-bootstrap.sh
Hidden=false
NoDisplay=false
X-GNOME-Autostart-enabled=true
Name=First-Boot Bootstrap Setup
Comment=Clones and runs the os_bootstrap Ansible playbook on first login
EOF

# Create the helper script that runs in Konsole
cat << 'EOF' > /home/boris/desktop-bootstrap.sh
#!/usr/bin/env bash
set -euo pipefail

echo "=========================================================="
echo "🚀 Welcome to your new Fedora KDE system, Boris!"
echo "=========================================================="
echo ""
echo "🔌 Checking internet connection..."
until ping -c1 -W1 github.com &>/dev/null; do
    echo "   Waiting for internet connection..."
    sleep 2
done
echo "✅ Internet connection detected!"
echo ""

echo "🔄 Cloning os_bootstrap repository..."
mkdir -p ~/Workspace
cd ~/Workspace
if [[ -d "os_bootstrap" ]]; then
    rm -rf "os_bootstrap"
fi
git clone https://github.com/prymost/os_bootstrap.git
cd os_bootstrap

echo "🚀 Running Ansible Playbook configuration..."
# Run the playbook locally, prompting you for your sudo password
ansible-playbook -K ansible/local.yml

# Self-destruct this autostart entry so it only runs once
rm -f ~/.config/autostart/bootstrap.desktop

echo ""
echo "=========================================================="
echo "✅ Provisioning complete!"
echo "🔄 Press Enter to reboot your computer and apply all settings."
echo "=========================================================="
read -r
sudo reboot
EOF

# Set permissions so the user 'boris' owns everything
chmod +x /home/boris/desktop-bootstrap.sh
chown -R boris:boris /home/boris/
%end
